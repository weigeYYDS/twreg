name: Twitch 自动注册

on:
  workflow_dispatch:
    inputs:
      jobs:
        description: '任务数量'
        required: true
        type: number
        default: 256
      count:
        description: '每个任务注册账号数量'
        required: true
        type: number
        default: 10
      threads:
        description: '每个任务并行线程数'
        type: number
        default: 4
      front_ip:
        description: '前端服务器 IP（自动拼接 http://IP:5000）'
        required: false
        type: string
        default: '103.42.30.252'
  schedule:
    # 每天 UTC 0:00 (北京时间 8:00)
    - cron: '0 0 * * *'

env:
  PYTHONUNBUFFERED: '1'
  NODE_PATH: ${{ github.workspace }}\node_modules

jobs:
  # 动态生成 job 索引数组
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job_indices: ${{ steps.set-matrix.outputs.job_indices }}
    steps:
      - name: 生成 job 索引
        id: set-matrix
        run: |
          JOBS=${{ inputs.jobs || 1 }}
          indices=$(seq 1 $JOBS | jq -R -s -c 'split("\n")[:-1] | map(tonumber)')
          echo "job_indices=$indices" >> $GITHUB_OUTPUT
        shell: bash

  register:
    needs: prepare
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        job_index: ${{ fromJSON(needs.prepare.outputs.job_indices) }}
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      CLOAK_BROWSER_PATH: ${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\cloakbrowser\chrome.exe
      RESULTS_DIR: ${{ github.workspace }}\results_job${{ matrix.job_index }}
      WARM_PROFILE_DIR: ${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\profiles
      WORKER_ID: github_actions_${{ github.run_id }}_job${{ matrix.job_index }}
      FRONT_URL: http://${{ inputs.front_ip || 'xxx.xx' }}:5000

    steps:
      # ============================================================
      # Step 1 — 拉取私有仓库代码
      # ============================================================
      - name: 克隆私有仓库 (xbox-cn/Tw_Reg_New)
        run: |
          git clone --depth 1 https://oauth2:${{ secrets.PRIVATE_REPO_PAT }}@github.com/xbox-cn/Tw_Reg_New.git ${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}
        shell: pwsh

      # ============================================================
      # Step 2 — 下载 CloakBrowser
      # ============================================================
      - name: 下载 CloakBrowser
        run: |
          $cloakUrl = "${{ secrets.CLOAKBROWSER_URL }}"
          if (-not $cloakUrl -or $cloakUrl -eq '') {
            $cloakUrl = "https://github.com/CloakHQ/CloakBrowser/releases/download/chromium-v146.0.7680.177.5/cloakbrowser-windows-x64.zip"
            Write-Host "使用公开 CloakBrowser 直链"
          }
          Write-Host "下载: $cloakUrl"
          $zipPath = "${{ github.workspace }}\cloak_job${{ matrix.job_index }}.zip"
          Invoke-WebRequest -Uri $cloakUrl -OutFile $zipPath
          Write-Host "解压中..."
          Expand-Archive -Path $zipPath -DestinationPath "${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\cloakbrowser" -Force
          Write-Host "CloakBrowser 就绪"
        shell: pwsh

      - name: 验证 CloakBrowser
        run: |
          if (Test-Path "${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\cloakbrowser\chrome.exe") {
            Write-Host "chrome.exe OK"
          } else {
            Get-ChildItem "${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\cloakbrowser" -Recurse -Name | Select-Object -First 20
            Write-Error "chrome.exe 未找到!"
            exit 1
          }
        shell: pwsh

      # ============================================================
      # Step 3 — 设置运行环境
      # ============================================================
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\requirements.txt'

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r "${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\requirements.txt"
        shell: pwsh

      - name: 安装 Playwright Chromium
        run: python -m playwright install chromium
        shell: pwsh

      - name: 安装 Node 依赖 (playwright-core)
        run: npm install playwright-core
        working-directory: ${{ github.workspace }}
        shell: pwsh

      # ============================================================
      # Step 4 — 创建必要目录
      # ============================================================
      - name: 创建目录
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\results_job${{ matrix.job_index }}"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}\profiles"
        shell: pwsh

      # ============================================================
      # Step 5 — 执行注册
      # ============================================================
      - name: 运行 Twitch 注册 (Job ${{ matrix.job_index }})
        id: register
        run: |
          python main.py --count ${{ inputs.count || 1 }} --headless --threads ${{ inputs.threads || 1 }}
        working-directory: ${{ github.workspace }}\tw_reg_job${{ matrix.job_index }}
        shell: pwsh
        continue-on-error: true

      # ============================================================
      # Step 6 — 上传产物
      # ============================================================
      - name: 上传注册结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twitch-accounts-job${{ matrix.job_index }}-${{ github.run_id }}
          path: |
            ${{ github.workspace }}\results_job${{ matrix.job_index }}\accounts.jsonl
            ${{ github.workspace }}\results_job${{ matrix.job_index }}\run_*.log
          retention-days: 30

      - name: 上传错误截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twitch-errors-job${{ matrix.job_index }}-${{ github.run_id }}
          path: ${{ github.workspace }}\results_job${{ matrix.job_index }}\error_*.png
          retention-days: 7
