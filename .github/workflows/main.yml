name: Auto Registration Runner

on:
  workflow_dispatch:
    inputs:
      front_ip:
        description: 'Front server IP (FRONT_IP)'
        required: true
        type: string
        default: '198.44.182.21'
      job_count:
        description: 'Concurrent job count (REG_THREADS)'
        required: true
        type: string
        default: '256'
      register_count:
        description: 'Accounts per job (REGISTER_COUNT)'
        required: true
        type: string
        default: '20'
      failure_threshold:
        description: 'Cancel remaining tasks when failures reach this (FAILURE_THRESHOLD)'
        required: false
        type: string
        default: '2'
      mail_domains:
        description: 'Temp email domain for registration (MAIL_DOMAINS)'
        required: false
        type: string
        default: 'olsbvgq.shop'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      front-ip: ${{ steps.config.outputs.front-ip }}
      job-count: ${{ steps.config.outputs.job-count }}
      register-count: ${{ steps.config.outputs.register-count }}
      mail-domains: ${{ steps.config.outputs.mail-domains }}
      job-indices: ${{ steps.config.outputs.job-indices }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read parameters and parse job matrix
        id: config
        run: |
          FRONT_IP_VAL="${{ github.event.inputs.front_ip }}"
          JOB_COUNT="${{ github.event.inputs.job_count }}"
          REG_COUNT="${{ github.event.inputs.register_count }}"
          
          if [ -z "$FRONT_IP_VAL" ]; then
            echo "Error: FRONT_IP is required"
            exit 1
          fi
          if ! [[ "$JOB_COUNT" =~ ^[0-9]+$ ]] || [ "$JOB_COUNT" -lt 1 ]; then
            echo "Error: Invalid JOB_COUNT ($JOB_COUNT)"
            exit 1
          fi
          if ! [[ "$REG_COUNT" =~ ^[0-9]+$ ]] || [ "$REG_COUNT" -lt 1 ]; then
            echo "Error: Invalid REGISTER_COUNT ($REG_COUNT)"
            exit 1
          fi
          
          echo "front-ip=${FRONT_IP_VAL}" >> $GITHUB_OUTPUT
          echo "job-count=${JOB_COUNT}" >> $GITHUB_OUTPUT
          echo "register-count=${REG_COUNT}" >> $GITHUB_OUTPUT
          echo "mail-domains=${{ github.event.inputs.mail_domains || 'htazmbb.shop' }}" >> $GITHUB_OUTPUT
          
          INDICES=$(python3 -c "import json; print(json.dumps(list(range(int('$JOB_COUNT')))))")
          echo "job-indices=${INDICES}" >> $GITHUB_OUTPUT

  register:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        job-index: ${{ fromJson(needs.prepare.outputs.job-indices) }}
      fail-fast: false
      max-parallel: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: linux/req.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libnspr4 libnss3 \
            libasound2t64 libxshmfence1 libx11-xcb1 libxcb-dri3-0 \
            libxfixes3 libxext6 libxinerama1 \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf \
            xvfb

      - name: Install Python dependencies
        run: |
          cd linux
          pip install --upgrade pip
          pip install -r req.txt

      - name: Run registration (Job ${{ matrix.job-index }})
        run: |
          export WORKER_ID="wrk_job_${{ matrix.job-index }}_${{ github.run_id }}"
          export LOGURU_LEVEL=INFO
          python3 -m linux
        env:
          TWITCH_CTF: "1"
          FRONT_IP: ${{ needs.prepare.outputs.front-ip }}
          REGISTER_COUNT: ${{ needs.prepare.outputs.register-count }}
          FAILURE_THRESHOLD: ${{ github.event.inputs.failure_threshold }}
          MAIL_DOMAINS: ${{ needs.prepare.outputs.mail-domains }}

      - name: Upload logs
        if: always()
        run: |
          set -e
          ART_DIR="artifacts/job-${{ matrix.job-index }}"
          mkdir -p "$ART_DIR"
          cp linux/reg_linux_*.log "$ART_DIR/" 2>/dev/null || true
          if [ -d "linux/profiles" ]; then
            cp -r linux/profiles "$ART_DIR/" || true
          fi
          if [ -d "profiles" ]; then
            cp -r profiles "$ART_DIR/" || true
          fi
          cp -r linux/*.log "$ART_DIR/" 2>/dev/null || true
          TAR_PATH="artifacts/job-${{ matrix.job-index }}.tar.gz"
          tar -czf "$TAR_PATH" -C artifacts "job-${{ matrix.job-index }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-${{ matrix.job-index }}-artifacts
          path: artifacts/job-${{ matrix.job-index }}.tar.gz
          retention-days: 7
          if-no-files-found: ignore

  summary:
    needs: [prepare, register]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all logs
        uses: actions/download-artifact@v4
        with:
          path: logs

      - name: Show summary
        run: |
          echo "Completed."
          echo "Front: ${{ needs.prepare.outputs.front-ip }}"
          echo "Job count: ${{ needs.prepare.outputs.job-count }}"
          echo "Register count: ${{ needs.prepare.outputs.register-count }}"
          echo "Mail domains: ${{ needs.prepare.outputs.mail-domains }}"
